services:
  - type: web
    name: truck-stop-pos
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: truck-stop-pos-db
          property: connectionString

databases:
  - name: truck-stop-pos-db
    plan: free
